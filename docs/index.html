<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PigSave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@500;700&family=Roboto+Condensed:wght@400;500&family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="images/0.png" />
  <link rel="apple-touch-icon" href="images/0.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="container">

  <!-- ══ SCREEN 1 · Connect ═══════════════════════════════ -->
  <!-- 4×12 grid: a-d cols, 1-12 rows -->
  <div id="connectSection" class="screen screen-connect">

    <!-- 1d: lang pill (positioned absolutely) -->
    <div class="lang-selector">
      <button class="lang-pill" onclick="toggleLangMenu()">EN</button>
      <div class="lang-dropdown">
        <button class="lang-option active" onclick="pickLang('en')">EN</button>
        <button class="lang-option"        onclick="pickLang('vi')">VI</button>
        <button class="lang-option"        onclick="pickLang('zh')">CN</button>
      </div>
    </div>

    <!-- row 2, a-d: PigSave title -->
    <h1 class="c-title">PigSave</h1>

    <!-- rows 3-6, b-c: pig (center 2 cols) -->
    <div class="c-pig">
      <img src="images/a1.png" class="pig-static" alt="pig" />
    </div>

    <!-- row 7, a-d: intro text -->
    <p class="c-sub"
       data-vi="Tiết kiệm là thói quen tốt. Hãy làm điều đó trên chuỗi."
       data-en="Saving is a good habit. Let's bring it on-chain."
       data-zh="储蓄是个好习惯，让我们把它搬上链。">Saving is a good habit. Let's bring it on-chain.</p>

    <!-- row 8, a-d: connect button -->
    <button class="c-btn" onclick="connectWallet()">
      <span data-vi="KẾT NỐI VÍ" data-en="CONNECT WALLET" data-zh="连接钱包">CONNECT WALLET</span>
    </button>
  </div>

  <!-- ══ SCREEN 2 · Buy Pig ════════════════════════════════ -->
  <!-- 5×11 grid: a-e cols, 1-11 rows -->
  <div id="buySection" class="screen screen-buy hidden">

    <!-- row 1 a-d: header — PigSave logo left | lang pill + menu right -->
    <div class="b-header">
      <span class="b-logo">PigSave</span>
      <div class="b-header-right">
        <div class="lang-selector">
          <button class="lang-pill" onclick="toggleLangMenu()">EN</button>
          <div class="lang-dropdown">
            <button class="lang-option active" onclick="pickLang('en')">EN</button>
            <button class="lang-option"        onclick="pickLang('vi')">VI</button>
            <button class="lang-option"        onclick="pickLang('zh')">CN</button>
          </div>
        </div>
        <div class="b-menu-wrap">
          <button class="b-menu-btn" onclick="toggleBuyMenu()">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect y="0"    width="22" height="2.5" rx="1.25" fill="#5A3A28"/>
              <rect y="6.75" width="22" height="2.5" rx="1.25" fill="#5A3A28"/>
              <rect y="13.5" width="22" height="2.5" rx="1.25" fill="#5A3A28"/>
            </svg>
          </button>
          <div class="b-menu-dropdown hidden" id="buyMenuDropdown">
            <button class="b-menu-item" onclick="menuAction('history')">
              <span data-vi="Lịch sử giao dịch" data-en="Deposit History" data-zh="存款记录">Deposit History</span>
            </button>
            <button class="b-menu-item" onclick="menuAction('security')">
              <span data-vi="An toàn &amp; Bảo mật" data-en="Trust &amp; Security" data-zh="信任与安全">Trust &amp; Security</span>
            </button>
            <button class="b-menu-item" onclick="menuAction('about')">
              <span data-vi="Về PigSave" data-en="About PigSave" data-zh="关于 PigSave">About PigSave</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- row 2 c-e: wallet address + balance (right-aligned) -->
    <div class="b-wallet-info">
      <div class="b-wallet-top">
        <span class="wallet-label" id="buyWalletAddr"></span>
        <button class="btn-disconnect" onclick="disconnectWallet()"
                data-vi="Ngắt kết nối" data-en="Disconnect" data-zh="断开连接">Disconnect</button>
      </div>
      <div class="b-wallet-balance" id="buyWalletBalance">– USDC</div>
    </div>

    <!-- rows 3-5, b-d: pig -->
    <div class="c-pig">
      <img src="images/a1.png" class="pig-static" alt="pig" />
    </div>

    <!-- row 7 a-e: subtitle -->
    <p class="b-subtitle"
       data-vi="Chọn chế độ và bắt đầu hành trình tiết kiệm"
       data-en="Pick a saving mode and begin your saving journey"
       data-zh="选择存钱模式，开启你的存钱之旅">Pick a saving mode and begin your saving journey</p>

    <!-- row 8 b-e: Normal / With Goal toggle -->
    <div class="b-mode-toggle">
      <div class="b-mode-btns">
        <button id="selectNormal"  class="b-mode-btn active" onclick="selectMode('normal')">
          <span data-vi="Bình thường" data-en="Normal" data-zh="普通">Normal</span>
        </button>
        <button id="selectPurpose" class="b-mode-btn"        onclick="selectMode('purpose')">
          <span data-vi="Có mục tiêu" data-en="With Goal" data-zh="目标">With Goal</span>
        </button>
      </div>
    </div>

    <!-- row 9 b-e: description text + goal input -->
    <div class="b-desc-row">
      <p id="modeDesc" class="b-mode-desc"
         data-vi="Bỏ heo ít nhất 30 lần và lấy lại 1 USDC"
         data-en="Save at least 30 times and get your 1 USDC back"
         data-zh="至少存30次，即可退回1 USDC">Save at least 30 times and get your 1 USDC back</p>
      <div id="goalInputWrap" class="hidden">
        <input id="goalInput" type="number" min="1" step="1"
               placeholder="Goal amount (USDC)" class="goal-input" />
      </div>
    </div>

    <!-- rows 10-11 b-d: BUY PIG button -->
    <button class="b-buy-btn" onclick="buyPigAction()">
      <span data-vi="MUA HEO – 1 USDC" data-en="BUY PIG – 1 USDC" data-zh="购买小猪 – 1 USDC">BUY PIG – 1 USDC</span>
    </button>

  </div>

  <!-- ══ SCREEN 3 · Main App ═══════════════════════════════ -->
  <!-- 4×12 grid: mirrors buy/connect screens for visual consistency -->
  <div id="appSection" class="screen screen-app hidden">

    <!-- row 1 a-d: header — identical structure to buy screen -->
    <div class="b-header">
      <span class="b-logo">PigSave</span>
      <div class="b-header-right">
        <div class="lang-selector">
          <button class="lang-pill" onclick="toggleLangMenu()">EN</button>
          <div class="lang-dropdown">
            <button class="lang-option active" onclick="pickLang('en')">EN</button>
            <button class="lang-option"        onclick="pickLang('vi')">VI</button>
            <button class="lang-option"        onclick="pickLang('zh')">CN</button>
          </div>
        </div>
        <div class="b-menu-wrap">
          <button class="b-menu-btn" onclick="toggleAppMenu()">
            <svg width="22" height="16" viewBox="0 0 22 16" fill="none">
              <rect y="0"    width="22" height="2.5" rx="1.25" fill="#5A3A28"/>
              <rect y="6.75" width="22" height="2.5" rx="1.25" fill="#5A3A28"/>
              <rect y="13.5" width="22" height="2.5" rx="1.25" fill="#5A3A28"/>
            </svg>
          </button>
          <div class="b-menu-dropdown hidden" id="appMenuDropdown">
            <button class="b-menu-item" onclick="menuAction('history')">
              <span data-vi="Lịch sử giao dịch" data-en="Deposit History" data-zh="存款记录">Deposit History</span>
            </button>
            <button class="b-menu-item" onclick="menuAction('security')">
              <span data-vi="An toàn &amp; Bảo mật" data-en="Trust &amp; Security" data-zh="信任与安全">Trust &amp; Security</span>
            </button>
            <button class="b-menu-item" onclick="menuAction('about')">
              <span data-vi="Về PigSave" data-en="About PigSave" data-zh="关于 PigSave">About PigSave</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- row 2 c-d: wallet address + balance (top-right) -->
    <div class="a-wallet-info">
      <div class="b-wallet-top">
        <span class="wallet-label" id="walletAddr"></span>
        <button class="btn-disconnect" onclick="disconnectWallet()"
                data-vi="Ngắt kết nối" data-en="Disconnect" data-zh="断开连接">Disconnect</button>
      </div>
      <div class="b-wallet-balance" id="appWalletBalance">– USDC</div>
    </div>

    <!-- row 2 a-d: "Saved N times" + status line below -->
    <div class="a-stats">
      <div class="a-stats-row">
        <span class="stat-unit" data-vi="Đã bỏ" data-en="Saved" data-zh="已存">Saved</span>
        <span class="stat-big" id="depositCount">0</span>
        <span class="stat-unit" data-vi="lần" data-en="times" data-zh="次">times</span>
      </div>
      <p id="appStatus" class="a-status"></p>
    </div>

    <!-- rows 3-6 b-c: pig (dims under modal overlay — no z-index override) -->
    <div class="a-pig">
      <div class="pig-scale" id="pigScale">
        <img id="pigImg" src="images/a1.png" class="pig" alt="pig" />
      </div>
    </div>

    <!-- row 6 b-c: rank badge (bottom of pig area) -->
    <div id="rankBadge" class="a-rank rank-piglet">Piglet</div>

    <!-- row 7 a-d: progress bars -->
    <div id="normalProgress" class="a-progress">
      <div class="progress-track">
        <div id="progressFill" class="progress-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="progressLabel">0 / 30</span>
    </div>

    <div id="purposeProgress" class="a-progress hidden">
      <div class="progress-track">
        <div id="goalFill" class="progress-fill goal-fill" style="width:0%"></div>
      </div>
      <span class="progress-label" id="goalPct">0%</span>
    </div>

    <!-- row 8 a-d: motivational quote -->
    <p class="a-quote"
       data-vi="Góp gió thành bão"
       data-en="Many a little makes a mickle"
       data-zh="聚沙成塔，集腋成裘">Many a little makes a mickle</p>

    <!-- row 9 a-d: deposit buttons -->
    <div class="a-deposit-row">
      <button class="btn-deposit" onclick="deposit(1)">+1 USDC</button>
      <button class="btn-deposit" onclick="deposit(10)">+10 USDC</button>
      <button class="btn-deposit" onclick="deposit(100)">+100 USDC</button>
    </div>

    <!-- rows 10-11 a-d: break button -->
    <button class="btn-break a-break" onclick="tryWithdraw()">
      <span data-vi="Đập heo" data-en="Break the Pig" data-zh="打碎存钱罐">Break the Pig</span>
    </button>

  </div>
</div><!-- /container -->

<!-- Modal — early-break warning OR 30/30 success
     .success class added for success state (Break It turns orange).
     Pig stays visible above overlay (a-pig z-index: 60).
     modal-box anchored so buttons land near row 9. -->
<div id="modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h2 id="modalTitle"></h2>
    <p  id="modalBody"  class="modal-body"></p>
    <p  id="modalCount" class="modal-count"></p>
    <div class="modal-actions">
      <button class="btn-keep" onclick="closeModal()">
        <span data-vi="Tiếp tục kiên trì" data-en="Keep Saving" data-zh="继续存钱">Keep Saving</span>
      </button>
      <button class="btn-break-modal" id="modalBreakBtn" onclick="confirmWithdraw()">
        <span data-vi="Đập luôn" data-en="Break It" data-zh="打碎">Break It</span>
      </button>
    </div>
  </div>
</div>

<!-- Info Panel (About PigSave / Trust & Security / Deposit History) -->
<div id="infoPanel" class="info-panel-overlay hidden" onclick="handleInfoPanelClick(event)">
  <div class="info-panel-box">
    <button class="info-panel-close" onclick="closeInfoPanel()">✕</button>
    <h2 id="infoPanelTitle" class="info-panel-title"></h2>
    <div id="infoPanelContent" class="info-panel-content"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
